<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R25 Nav v1.3</title>

<!--
  navbar.html
  ============================================================
  Version : 1.0
  Date    : 2026-04-06
  Author  : Alik Levin / Realty 25 AZ

  Changelog
  ------------------------------------------------------------
  v1.3  2026-04-07  Dropdown now position:absolute, overlays page
                    content instead of pushing it down. iframe can
                    be set to 52px height (bar only).
  v1.2  2026-04-07  Match Carrd bg (#0f2340), switch to sans-serif.
  ============================================================
-->

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    background: transparent;
    overflow: visible;
  }

  body {
    font-family: 'Source Sans Pro', 'Lato', Arial, sans-serif;
  }

  /* ── Top bar ── */
  #navbar {
    background: #0f2340;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 52px;
    border-bottom: 1px solid rgba(197,160,80,0.25);
  }

  /* Site name / logo area */
  #brand {
    color: #c5a050;
    font-size: 15px;
    letter-spacing: 0.06em;
    font-weight: normal;
    text-decoration: none;
    white-space: nowrap;
  }

  /* Desktop link row — hidden on mobile */
  #desktop-links {
    display: flex;
    gap: 28px;
    align-items: center;
  }

  #desktop-links a {
    color: #c5a050;
    text-decoration: underline;
    font-size: 15px;
    letter-spacing: 0.03em;
    transition: color 0.18s;
    white-space: nowrap;
  }

  #desktop-links a:hover {
    color: #e8c96a;
  }

  /* Hamburger button — hidden on desktop */
  #hamburger {
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 5px;
    width: 36px;
    height: 36px;
    background: none;
    border: 1px solid rgba(197,160,80,0.4);
    border-radius: 4px;
    cursor: pointer;
    padding: 0;
    flex-shrink: 0;
  }

  #hamburger span {
    display: block;
    width: 18px;
    height: 2px;
    background: #c5a050;
    border-radius: 2px;
    transition: transform 0.25s ease, opacity 0.2s ease;
    transform-origin: center;
  }

  /* Animated X state */
  #hamburger.open span:nth-child(1) {
    transform: translateY(7px) rotate(45deg);
  }
  #hamburger.open span:nth-child(2) {
    opacity: 0;
  }
  #hamburger.open span:nth-child(3) {
    transform: translateY(-7px) rotate(-45deg);
  }

  /* ── Dropdown panel ── */
  #dropdown {
    position: absolute;
    top: 52px;
    left: 0;
    right: 0;
    background: #0f2340;
    border-bottom: 1px solid rgba(197,160,80,0.25);
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.3s ease;
    z-index: 999;
  }

  #dropdown.open {
    max-height: 400px;
  }

  #dropdown a {
    display: block;
    color: #c5a050;
    text-decoration: underline;
    font-size: 16px;
    letter-spacing: 0.04em;
    padding: 13px 24px;
    border-bottom: 1px solid rgba(197,160,80,0.1);
    transition: background 0.15s, color 0.15s;
  }

  #dropdown a:last-child {
    border-bottom: none;
  }

  #dropdown a:hover {
    background: rgba(197,160,80,0.08);
    color: #e8c96a;
  }

  /* ── Responsive breakpoint ── */
  @media (max-width: 600px) {
    #desktop-links {
      display: none;
    }
    #hamburger {
      display: flex;
    }
  }
</style>
</head>
<body>

<div id="navbar">
  <a id="brand" href="#">Realty 25 AZ</a>

  <!-- Desktop: inline links -->
  <nav id="desktop-links">
    <a href="#">Home</a>
    <a href="#">Pricing</a>
    <a href="#">Reviews</a>
    <a href="#">Calc</a>
    <a href="#">Comps</a>
    <a href="#">About</a>
  </nav>

  <!-- Mobile: hamburger button -->
  <button id="hamburger" aria-label="Open menu" aria-expanded="false">
    <span></span>
    <span></span>
    <span></span>
  </button>
</div>

<!-- Mobile dropdown -->
<div id="dropdown" role="navigation" aria-label="Mobile menu">
  <a href="#">Home</a>
  <a href="#">Pricing</a>
  <a href="#">Reviews</a>
  <a href="#">Calc</a>
  <a href="#">Comps</a>
  <a href="#">About</a>
</div>

<script>
  const btn = document.getElementById('hamburger');
  const menu = document.getElementById('dropdown');

  btn.addEventListener('click', function () {
    const isOpen = menu.classList.toggle('open');
    btn.classList.toggle('open', isOpen);
    btn.setAttribute('aria-expanded', isOpen);
  });
</script>

</body>
</html>
